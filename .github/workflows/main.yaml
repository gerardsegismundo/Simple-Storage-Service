name: CI/CD Pipeline - Multi-Environment Promotion

on:
  push:
    branches: [develop, staging, main, master]
  pull_request:
    branches: [develop, staging, main, master]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.5.0

jobs:
  # ============================================================
  # Stage 1: Build & Package (runs on all branches)
  # ============================================================
  build:
    name: Build / Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Validate Terraform formatting
        run: |
          cd terraform
          terraform fmt -check -recursive

      - name: Initialize Terraform for validation
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

  # ============================================================
  # Stage 2: Test & Validate (runs on all branches)
  # ============================================================
  test:
    name: Test / Validate
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run project tests
        run: |
          pytest tests/ --maxfail=1 --disable-warnings -q

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

  # ============================================================
  # Stage 3: Deploy to Development (develop branch only)
  # ============================================================
  deploy-dev:
    name: Deploy to Development
    needs: test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Initialize Terraform
        run: |
          cd terraform
          terraform init -backend=false

      - name: Deploy to Development
        run: |
          cd terraform
          terraform plan -var-file=dev.tfvars
          terraform apply -auto-approve -var-file=dev.tfvars

  # ============================================================
  # Stage 4: Deploy to Staging (staging branch only)
  # ============================================================
  deploy-staging:
    name: Deploy to Staging
    needs: test
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Initialize Terraform
        run: |
          cd terraform
          terraform init -backend=false

      - name: Deploy to Staging
        run: |
          cd terraform
          terraform plan -var-file=prod.tfvars
          terraform apply -auto-approve -var-file=prod.tfvars

  # ============================================================
  # Stage 5: Production Approval (main/master branch only)
  # ============================================================
  approval-prod:
    name: Production Approval
    needs: test
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production
      # Approval required before proceeding
    outputs:
      approved: ${{ steps.approve.outputs.approved }}

    steps:
      - name: Await Manual Approval
        id: approve
        run: |
          echo "⏸️  Production deployment is awaiting manual approval..."
          echo "approved=true" >> $GITHUB_OUTPUT

  # ============================================================
  # Stage 6: Deploy to Production (main/master with approval)
  # ============================================================
  deploy-prod:
    name: Deploy to Production
    needs: approval-prod
    if: needs.approval-prod.outputs.approved == 'true'
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Initialize Terraform
        run: |
          cd terraform
          terraform init -backend=false

      - name: Deploy to Production
        run: |
          cd terraform
          terraform plan -var-file=prod.tfvars
          terraform apply -auto-approve -var-file=prod.tfvars