name: CI/CD Pipeline

on:
  push:
    branches: [develop, staging, main]  

permissions:
  id-token: write
  contents: write
  security-events: write

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.5.0

jobs:

# ============================================================
# 1. BUILD
# ============================================================
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Terraform fmt check
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: cd terraform && terraform fmt -check -recursive


# ============================================================
# 2. TEST
# ============================================================
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - run: pip install pytest
      - run: pytest tests/ -q


# ============================================================
# 3. VALIDATE
# ============================================================
  validate:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: |
          cd terraform
          terraform init -backend=false
          terraform validate

# ============================================================
# 4. SECURITY SCAN 
# ============================================================
  security:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # --------------------------------------------
      # Terraform security scan (Checkov)
      # --------------------------------------------
      - name: Run Checkov Security Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform

      # --------------------------------------------
      # Secret scanning (Gitleaks)
      # --------------------------------------------
      - name: Run Gitleaks (Secret Detection)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}



# ============================================================
# DEPLOY DEV
# ============================================================
  deploy_dev:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development

    env:
      TF_VAR_github_token: ${{ secrets.GH_PAT }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: |
          BUCKET="s3-platform-tf-state-main"
          aws s3 mb s3://$BUCKET --region ${{ env.AWS_REGION }} || echo "Bucket may already exist"
          aws s3api put-bucket-versioning --bucket $BUCKET --versioning-configuration Status=Enabled || true

      - run: cd terraform && terraform init

      - run: cd terraform && terraform apply -auto-approve

      - run: |
          BUCKET=$(cd terraform && terraform output -raw primary_bucket)
          aws s3 cp index.html "s3://$BUCKET/" --cache-control max-age=3600
          aws s3 cp error.html "s3://$BUCKET/" --cache-control max-age=3600 || true
      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(cd terraform && terraform output -raw cloudfront_distribution_id)
          aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"


# ============================================================
# DEPLOY STAGING (STEP AFTER DEV)
# ============================================================
  deploy_staging:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging

    env:
      TF_VAR_github_token: ${{ secrets.GH_PAT }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: |
          BUCKET="s3-platform-tf-state-main"
          aws s3 mb s3://$BUCKET --region ${{ env.AWS_REGION }} || echo "Bucket may already exist"
          aws s3api put-bucket-versioning --bucket $BUCKET --versioning-configuration Status=Enabled || true

      - run: cd terraform && terraform init
      - run: cd terraform && terraform apply -auto-approve

      - run: |
          BUCKET=$(cd terraform && terraform output -raw primary_bucket)
          aws s3 cp index.html "s3://$BUCKET/" --cache-control max-age=3600
          aws s3 cp error.html "s3://$BUCKET/" --cache-control max-age=3600 || true

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(cd terraform && terraform output -raw cloudfront_distribution_id)
          aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"


# ============================================================
# DEPLOY PROD (STEP AFTER STAGING)
# ============================================================
  deploy_prod:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    environment:
      name: production   

    env:
      TF_VAR_github_token: ${{ secrets.GH_PAT }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - run: |
          BUCKET="s3-platform-tf-state-main"
          aws s3 mb s3://$BUCKET --region ${{ env.AWS_REGION }} || echo "Bucket may already exist"
          aws s3api put-bucket-versioning --bucket $BUCKET --versioning-configuration Status=Enabled || true

      - run: cd terraform && terraform init
      - run: cd terraform && terraform apply -auto-approve

      - run: |
          BUCKET=$(cd terraform && terraform output -raw primary_bucket)
          aws s3 cp index.html "s3://$BUCKET/" --cache-control max-age=3600
          aws s3 cp error.html "s3://$BUCKET/" --cache-control max-age=3600 || true

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(cd terraform && terraform output -raw cloudfront_distribution_id)
          aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"