name: CI/CD Pipeline - Multi-Environment Promotion

on:
  pull_request:
    branches: [develop, staging, main]

  push:
    branches: [develop, staging, main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.5.0

# Prevent duplicate runs for same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true


# ============================================================
# STAGE 1: BUILD
# ============================================================
jobs:
  build:
    name: Build / Package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform format check
        run: |
          cd terraform
          terraform fmt -check -recursive


# ============================================================
# STAGE 2: TEST
# ============================================================
  test:
    name: Test / Validate (Unit Tests)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest

      - name: Run tests
        run: pytest tests/ -q


# ============================================================
# STAGE 3: TERRAFORM VALIDATION (PR + PIPELINE GATE)
# ============================================================
  terraform_validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init + validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate


# ============================================================
# STAGE 4: PLAN (ONLY ON PULL REQUESTS)
# ============================================================
  terraform_plan:
    name: Terraform Plan (PR Only)
    runs-on: ubuntu-latest
    needs: terraform_validate
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: cd terraform && terraform init -backend=false

      - name: Plan
        run: |
          cd terraform
          terraform plan


# ============================================================
# STAGE 5: DEPLOY DEVELOPMENT
# ============================================================
  deploy_dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: terraform_validate
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    environment:
      name: development

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: cd terraform && terraform init

      - name: Terraform apply (dev)
        run: |
          cd terraform
          terraform apply -auto-approve -var-file=dev.tfvars


# ============================================================
# STAGE 6: DEPLOY STAGING
# ============================================================
  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: terraform_validate
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'

    environment:
      name: staging   # <-- add manual approval in GitHub settings

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: cd terraform && terraform init

      - name: Terraform apply (staging)
        run: |
          cd terraform
          terraform apply -auto-approve -var-file=staging.tfvars


# ============================================================
# STAGE 7: DEPLOY PRODUCTION
# ============================================================
  deploy_prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: terraform_validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production   # <-- MUST require approval in GitHub settings

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: cd terraform && terraform init

      - name: Terraform apply (prod)
        run: |
          cd terraform
          terraform apply -auto-approve -var-file=prod.tfvars