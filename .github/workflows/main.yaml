name: CI/CD Pipeline - Multi-Environment Promotion

on:
  push:
    branches: [develop, staging, main]
  pull_request:
    branches: [develop, staging, main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.5.0

jobs:
  # ============================================================
  # Stage 1: Build / Package
  # ============================================================
  build:
    name: Build / Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Validate Terraform formatting
        run: |
          cd terraform
          terraform fmt -check -recursive

  # ============================================================
  # Stage 2: Test / Validation
  # ============================================================
  test:
    name: Test / Validate
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run project tests
        run: |
          pytest tests/ --maxfail=1 --disable-warnings -q

  # ============================================================
  # Stage 3: Terraform Validation
  # ============================================================
  terraform-validate:
    name: Terraform Validation
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Initialize Terraform for validation
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

  # ============================================================
  # Stage 4: Deploy to Development
  # ============================================================
  deploy-dev:
    name: Deploy to Development
    needs: terraform-validate
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Initialize Terraform for deployment
        run: |
          cd terraform
          terraform init

      - name: Plan Development deployment
        run: |
          cd terraform
          terraform plan -var-file=dev.tfvars

      - name: Apply Development deployment
        run: |
          cd terraform
          terraform apply -auto-approve -var-file=dev.tfvars

  # ============================================================
  # Stage 5: Deploy to Staging
  # ============================================================
  deploy-staging:
    name: Deploy to Staging
    needs: terraform-validate
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Initialize Terraform for deployment
        run: |
          cd terraform
          terraform init

      - name: Plan Staging deployment
        run: |
          cd terraform
          terraform plan -var-file=staging.tfvars

      - name: Apply Staging deployment
        run: |
          cd terraform
          terraform apply -auto-approve -var-file=staging.tfvars

  # ============================================================
  # Stage 6: Deploy to Production
  # ============================================================
  deploy-prod:
    name: Deploy to Production
    needs: terraform-validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Initialize Terraform for deployment
        run: |
          cd terraform
          terraform init

      - name: Plan Production deployment
        run: |
          cd terraform
          terraform plan -var-file=prod.tfvars

      - name: Apply Production deployment
        run: |
          cd terraform
          terraform apply -auto-approve -var-file=prod.tfvars